    </script>
    <style>
        /* CSS reset & layout */
        body {
            margin: 0;
            padding: 0;
            background-color: #DB3966;
            /* Match canvas background for non 16:9 screens */
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Cera Pro', sans-serif;
        }

        #canvas {
            width: 100vw;
            height: 100vh;
            max-width: 177.78vh;
            /* 16/9 * 100vh */
            max-height: 56.25vw;
            /* 9/16 * 100vw */
            background-color: #DB3966;
            position: relative;
            /* box-shadow removed as requested */
            overflow: hidden;
            container-type: size;
            /* Enable container queries for responsive internal sizing */
        }

        #canvas.full-window {
            max-width: none;
            max-height: none;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            /* Remove padding here to allow sticky edges on sharepics */
            will-change: opacity;
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
        }

        .slide.active {
            opacity: 1;
        }

        body.no-animation .slide {
            transition: none !important;
        }

        .slide-content-wrapper {
            /* General padding for slides that aren't sharepics */
            padding: 5cqh 5cqw;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            flex-direction: column;
        }

        /* Loading Slide */
        .loading-text {
            color: white;
            font-size: 5cqw;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        /* Config Flags */
        :root {
            --rounded-corners: 0cqw;
            /* Set to 1cqw to enable rounded corners */
        }

        /* Sharepic Layouts */
        .sharepics {
            display: flex;
            justify-content: space-between;
            /* push to sides if multiple */
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .sharepics img {
            height: 100%;
            /* Full height */
            /* Width adjusts automatically to preserve aspect ratio, restricted by object-fit */
            max-width: 50%;
            /* Ensure two images fit without squishing */
            object-fit: contain;
            box-shadow: 15px 15px 35px rgba(0, 0, 0, 0.4);
            border-radius: var(--rounded-corners);
        }

        .sharepics.single {
            justify-content: center;
        }

        .sharepics.single img {
            max-width: 100%;
            height: 100%;
        }

        /* Logo Slide */
        .logo-slide img {
            max-width: 80cqw;
            max-height: 80cqh;
            object-fit: contain;
        }

        /* Events Slide */
        .events-slide h1 {
            font-size: 4cqw;
            margin-top: 2cqh;
            margin-bottom: 2cqh;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            text-align: center;
            color: white;
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 1cqh;
            width: 85cqw;
            color: white;
        }

        .event-item {
            display: flex;
            flex-direction: row;
            background: rgba(255, 255, 255, 0.15);
            padding: 1.5cqh 2cqw;
            border-radius: 1.5cqw;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            align-items: center;
        }

        .event-date {
            font-size: 2.5cqw;
            font-weight: bold;
            width: 18cqw;
            padding-right: 2cqw;
            margin-right: 2cqw;
            border-right: 2px solid rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .event-details {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            flex: 1;
        }

        .event-title {
            font-size: 2.5cqw;
            font-weight: bold;
            margin-bottom: 0;
        }

        .event-time {
            font-size: 2cqw;
            white-space: nowrap;
            opacity: 0.9;
        }

        /* Truly Compact Mode Events */
        .events-slide.compact h1 {
            font-size: 3cqw;
            margin-top: 1.5cqh;
            margin-bottom: 1.5cqh;
        }

        .events-slide.compact .event-list {
            gap: 0.5cqh;
        }

        .events-slide.compact .event-item {
            padding: 1cqh 1.5cqw;
            border-radius: 1cqw;
        }

        .events-slide.compact .event-date {
            font-size: 1.8cqw;
            width: 15cqw;
            padding-right: 1.5cqw;
            margin-right: 1.5cqw;
        }

        .events-slide.compact .event-title {
            font-size: 1.8cqw;
        }

        .events-slide.compact .event-time {
            font-size: 1.5cqw;
        }
        /* Mitmachen Slide */
        .mitmachen-slide {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 5cqw;
            gap: 3cqh;
        }

        .mitmachen-slide .mitmachen-text {
            font-size: 5.5cqw;
            font-weight: bold;
            line-height: 1.3;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.2);
            max-width: 80cqw;
        }

        .mitmachen-slide .mitmachen-url {
            font-size: 4cqw;
            font-weight: bold;
            opacity: 0.9;
            background: rgba(255, 255, 255, 0.2);
            padding: 1.5cqh 4cqw;
            border-radius: 2cqw;
            letter-spacing: 0.05em;
        }

        /* Social Media Mode (4:5 ratio, matches sharepic brand style) */
        #canvas.social-media {
            max-width: 80vh;    /* 4:5: width = 4/5 × height */
            max-height: 125vw;  /* 4:5: height = 5/4 × width */
            background: white;
        }

        /* sm-slide uses absolute inset so it always fills the full canvas,
           regardless of how the parent .slide flex container resolves height. */
        .sm-slide {
            position: absolute;
            inset: 0;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sm-header {
            background: #DB3966;
            padding: 4.5cqw 5cqw 4cqw;
            flex-shrink: 0;
        }

        .sm-header-title {
            color: white;
            font-size: 9.2cqw;
            font-weight: bold;
            line-height: 1.05;
            margin: 0;
            letter-spacing: -0.015em;
        }

        .sm-events {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            padding: 2cqw 5cqw;
            overflow: hidden;
        }

        .sm-event {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 2.0cqw;
        }

        .sm-event-date {
            display: inline-block;
            background: #DB3966;
            color: white;
            font-size: 2.8cqw;
            font-weight: bold;
            padding: 0.5cqw 2.0cqw 0.45cqw;
            letter-spacing: 0.03em;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .sm-event-title {
            font-size: 4.5cqw;
            font-weight: bold;
            color: black;
            line-height: 1.1;
            margin: 0;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sm-event-title--internal {
            color: #888;
        }

        .sm-legend {
            flex-shrink: 0;
            padding: 0 5cqw 1.8cqw;
            display: flex;
            align-items: center;
            gap: 1.2cqw;
        }

        .sm-legend-swatch {
            width: 2.2cqw;
            height: 2.2cqw;
            background: #888;
            flex-shrink: 0;
        }

        .sm-legend-text {
            font-size: 2.2cqw;
            color: #888;
            margin: 0;
        }

        .sm-footer {
            background: #DB3966;
            padding: 2cqw 5cqw;
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }

        .sm-footer-text {
            color: white;
            font-size: 3.2cqw;
            font-weight: bold;
            margin: 0;
            letter-spacing: 0.05em;
        }

        /* Disco Mode Styles */
        body.disco-mode, #canvas.disco-mode {
            animation: discoBg 1.5s infinite;
        }

        @keyframes discoBg {
            0% { background-color: #DB3966; }
            16% { background-color: #ff0055; }
            33% { background-color: #9900ff; }
            50% { background-color: #00ccff; }
            66% { background-color: #00ff00; }
            83% { background-color: #ffff00; }
            100% { background-color: #ff8800; }
        }

        .glitter {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            animation: twinkle linear infinite;
        }

        @keyframes twinkle {
            0% { opacity: 0; transform: scale(0.2) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.5) rotate(180deg); }
            100% { opacity: 0; transform: scale(0.2) rotate(360deg); }
        }

        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9998;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 70%);
            animation: strobe 0.4s infinite alternate;
            mix-blend-mode: overlay;
        }

        @keyframes strobe {
            0% { opacity: 0; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.5); }
        }
    </style>
</head>

<body>
    <div id="canvas">
        <div id="slides-container">
            <!-- Loading Slide -->
            <div class="slide active">
                <div class="slide-content-wrapper">
                    <h1 class="loading-text">Lade Inhalte...</h1>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WP_API_URL = 'https://www.vielbunt.org/wp-json/wp/v2/posts';
        const ICS_URL = 'https://calendar.google.com/calendar/ical/vielbunt.org_9dumkl9hgmdsf22bvi3vb7du78%40group.calendar.google.com/private-013fe0c849d9583baa62c544041996a4/basic.ics';

        let slidesData = [];
        let currentSlideIndex = 0;

        async function init() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const isCompact = urlParams.has('compact_mode') || urlParams.get('mode') === 'compact';
                const isMitmachen = urlParams.has('mitmachen') || urlParams.get('mode') === 'mitmachen';
                const isSocialMedia = urlParams.get('mode') === 'socialmedia';
                const eventsOnly = isCompact || urlParams.has('events_only') || urlParams.get('mode') === 'events';
                const isDisco = urlParams.get('disco') === 'true' || urlParams.has('disco');
                const noAnimation = urlParams.has('no_animation') || urlParams.get('animation') === 'false' || urlParams.has('no_fade');

                if (isDisco) {
                    startDisco();
                }

                if (noAnimation) {
                    document.body.classList.add('no-animation');
                }

                if (isCompact) {
                    document.getElementById('canvas').classList.add('full-window');
                }

                const isPoster = urlParams.get('poster') === 'true' || urlParams.has('poster');
                const showLegend = urlParams.get('legend') !== 'false';

                if (isSocialMedia) {
                    document.getElementById('slides-container').innerHTML = `<div class="slide active"><div class="slide-content-wrapper"><h1 class="loading-text">Lade Termine...</h1></div></div>`;
                    const events = await fetchEvents(true);
                    buildSocialMediaSlide(events, isPoster, showLegend);
                    // No slideshow — social media mode is a single static frame
                    return;
                }

                if (eventsOnly) {
                    document.getElementById('slides-container').innerHTML = `<div class="slide active"><div class="slide-content-wrapper"><h1 class="loading-text">Lade Termine...</h1></div></div>`;
                    const events = await fetchEvents(isCompact);
                    buildSlides([], events, true, isCompact, isMitmachen);
                } else {
                    const [posts, events] = await Promise.all([
                        fetchPosts(),
                        fetchEvents(false)
                    ]);

                    buildSlides(posts, events, false, false, isMitmachen);
                }

                startSlideshow();
            } catch (error) {
                console.error('Fehler beim Initialisieren:', error);
                document.getElementById('slides-container').innerHTML = `<div class="slide active"><h1 class="loading-text">Fehler beim Laden der Inhalte.</h1></div>`;
            }
        }

        async function fetchPosts() {
            const today = new Date();
            const threeWeeksAgo = new Date();
            threeWeeksAgo.setDate(today.getDate() - 21);
            const isoString = threeWeeksAgo.toISOString();

            const response = await fetch(`${WP_API_URL}?after=${isoString}&per_page=100&_fields=title,content`);
            if (!response.ok) throw new Error('WP API fetch failed');
            const posts = await response.json();

            const startOfToday = new Date(today.getFullYear(), today.getMonth(), today.getDate());

            const slidePosts = [];

            posts.forEach(post => {
                const rawTitle = post.title?.rendered || '';

                // Skip cancelled events
                if (/abgesagt/i.test(rawTitle)) return;

                let sortDate = new Date(post.date);

                // Try to parse event date or range from title
                // Support TT.MM. or TT.MM.YYYY, optionally with ranges (TT.MM. - TT.MM.)
                // Now supports different dash types (-, –, —) and look anywhere in the title
                const dateRegex = /(\d{2})\.(\d{2})\.(?:(\d{4}))?(?:\s*[–\—\-]\s*(\d{2})\.(\d{2})\.(?:(\d{4}))?)?/;
                const rangeMatch = rawTitle.match(dateRegex);
                
                if (rangeMatch) {
                    // Use end date if it's a range (group 4 & 5), otherwise start date (group 1 & 2)
                    const day = parseInt(rangeMatch[4] || rangeMatch[1], 10);
                    const month = parseInt(rangeMatch[5] || rangeMatch[2], 10) - 1;
                    const yearInTitle = rangeMatch[6] || rangeMatch[3];
                    
                    let year;
                    if (yearInTitle) {
                        year = parseInt(yearInTitle, 10);
                    } else {
                        year = today.getFullYear();
                        const eventDateThisYear = new Date(year, month, day);
                        if (eventDateThisYear < startOfToday) {
                            const daysPast = (startOfToday - eventDateThisYear) / (1000 * 60 * 60 * 24);
                            if (daysPast > 180) {
                                year += 1;
                            }
                        }
                    }
                    const eventDate = new Date(year, month, day);
                    if (eventDate < startOfToday) return; // skip past events
                    sortDate = eventDate; // Use event date for sorting if present
                }
                // Posts without a parseable date use their publish date as sortDate

                const parser = new DOMParser();
                const doc = parser.parseFromString(post.content.rendered, 'text/html');
                const images = Array.from(doc.querySelectorAll('img')).map(img => img.src);

                if (images.length > 0) {
                    const firstImage = images[0];
                    const lastImage = images[images.length - 1];

                    if (images.length === 1) {
                        slidePosts.push({ type: 'sharepics', images: [firstImage], sortDate });
                    } else {
                        slidePosts.push({ type: 'sharepics', images: [firstImage, lastImage], sortDate });
                    }
                }
            });

            // Sort by date ascending (soonest event/newest post first)
            return slidePosts.sort((a, b) => a.sortDate - b.sortDate);
        }

        const ICS_CACHE_KEY = 'vielbunt_ics';
        const ICS_CACHE_TTL = 30 * 60 * 1000; // 30 min

        const PROXIES = [
            {
                url: `https://cors.io/?url=${encodeURIComponent(ICS_URL)}`,
                extract: async (r) => { const j = await r.json(); return j.body; }
            },
            {
                url: `https://api.allorigins.win/raw?url=${encodeURIComponent(ICS_URL)}`,
                extract: async (r) => r.text()
            },
            {
                url: `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(ICS_URL)}`,
                extract: async (r) => r.text()
            }
        ];

        async function fetchICSFromProxy(proxy) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), 5000);
            try {
                const response = await fetch(proxy.url, { signal: controller.signal });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const text = await proxy.extract(response);
                if (!text || !text.includes('BEGIN:VCALENDAR')) throw new Error('Invalid ICS');
                console.log('ICS fetched via', proxy.url.split('?')[0]);
                return text;
            } finally {
                clearTimeout(id);
            }
        }

        async function fetchAndCacheICS() {
            const text = await Promise.any(PROXIES.map(p => fetchICSFromProxy(p)))
                .catch(() => { throw new Error('All proxy fetches failed'); });
            try {
                localStorage.setItem(ICS_CACHE_KEY, JSON.stringify({ text, ts: Date.now() }));
            } catch (_) {}
            return text;
        }

        async function fetchICSText() {
            try {
                const raw = localStorage.getItem(ICS_CACHE_KEY);
                if (raw) {
                    const { text, ts } = JSON.parse(raw);
                    const age = Date.now() - ts;
                    if (age < ICS_CACHE_TTL && text && text.includes('BEGIN:VCALENDAR')) {
                        if (age > ICS_CACHE_TTL / 2) fetchAndCacheICS().catch(() => {});
                        console.log(`ICS from cache (${Math.round(age / 1000)}s old)`);
                        return text;
                    }
                }
            } catch (_) {}
            return fetchAndCacheICS();
        }

        async function fetchEvents(isCompact = false) {
            const textData = await fetchICSText();
            return parseICS(textData, isCompact);
        }

        function parseICS(icsData, isCompact = false) {
            // Handle ICS line folding (a newline followed by a space or tab is a continuation of the previous line)
            const unfoldedData = icsData.replace(/\r?\n[ \t]/g, '');
            const lines = unfoldedData.split(/\r?\n/);

            const allEvents = [];
            let currentEvent = null;

            lines.forEach(line => {
                if (line.startsWith('BEGIN:VEVENT')) {
                    currentEvent = {};
                } else if (line.startsWith('END:VEVENT')) {
                    if (currentEvent) {
                        allEvents.push(currentEvent);
                        currentEvent = null;
                    }
                } else if (currentEvent) {
                    if (line.startsWith('SUMMARY:')) {
                        currentEvent.summary = line.substring(8);
                    } else if (line.startsWith('DTSTART')) {
                        const dateStr = line.split(':').pop();
                        currentEvent.start = parseICSDate(dateStr);
                        // Track whether this DTSTART carries a TZID (local-time event).
                        // rrule.js v2.x uses getUTC* internally, so DST shifts cause
                        // a 1-hour error for events defined in a different DST season.
                        // We fix this with the naive-UTC round-trip in the rrule path.
                        currentEvent.dtStartHasTzid = line.includes('TZID');
                    } else if (line.startsWith('DTEND')) {
                        const dateStr = line.split(':').pop();
                        currentEvent.end = parseICSDate(dateStr);
                    } else if (line.startsWith('RRULE:')) {
                        currentEvent.rrule = line.substring(6);
                    } else if (line.startsWith('EXDATE')) {
                        const dateStr = line.split(':').pop();
                        if (!currentEvent.exdates) currentEvent.exdates = [];
                        currentEvent.exdates.push(parseICSDate(dateStr).getTime());
                    } else if (line.startsWith('CLASS:')) {
                        currentEvent.cls = line.substring(6).trim();
                    } else if (line.startsWith('UID:')) {
                        currentEvent.uid = line.substring(4).trim();
                    } else if (line.startsWith('RECURRENCE-ID')) {
                        // Original slot this exception overrides in the parent series
                        const dateStr = line.split(':').pop();
                        currentEvent.recurrenceId = parseICSDate(dateStr);
                    }
                }
            });

            // Build a map of UID → [original-slot timestamps] for all exception events.
            // These slots must be suppressed when expanding the parent RRULE so the
            // rescheduled/modified exception is not shown twice.
            const recurrenceExceptions = {};
            allEvents.forEach(e => {
                if (e.recurrenceId && e.uid) {
                    if (!recurrenceExceptions[e.uid]) recurrenceExceptions[e.uid] = [];
                    recurrenceExceptions[e.uid].push(e.recurrenceId.getTime());
                }
            });

            // Filter for future events
            const now = new Date();
            // To ensure we show events happening today as well, we consider start time after midnight today
            const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const maxDays = new Date(now.getTime() + 365 * 2 * 24 * 60 * 60 * 1000); // look up to 2 years ahead

            const upcomingEvents = [];

            const staleThreshold = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);

            allEvents.forEach(e => {
                if (!e.start) return;

                // Skip private and confidential events (Sichtbarkeit = vertraulich)
                const cls = (e.cls || 'PUBLIC').toUpperCase();
                if (cls === 'PRIVATE' || cls === 'CONFIDENTIAL') return;

                // Skip non-recurring events that ended more than 30 days ago
                if (!e.rrule && !e.recurrenceId && e.start < staleThreshold) return;

                // Skip RRULE series whose UNTIL date is already in the past
                if (e.rrule) {
                    const untilMatch = e.rrule.match(/UNTIL=(\d{8}T?\d*Z?)/);
                    if (untilMatch) {
                        const untilStr = untilMatch[1];
                        const y = +untilStr.slice(0,4), mo = +untilStr.slice(4,6)-1, d = +untilStr.slice(6,8);
                        const until = new Date(y, mo, d);
                        if (until < startOfDay) return;
                    }
                }

                if (e.rrule && window.rrule) {
                    try {
                        const duration = e.end ? (e.end.getTime() - e.start.getTime()) : 0;

                        // rrule.js v2.x uses getUTC* on dtstart, ignoring the local DST offset.
                        // For TZID events (local Berlin time), we pass a "naive UTC" dtstart —
                        // i.e. treat the local HH:MM as if it were UTC — so rrule preserves the
                        // intended time-of-day across DST transitions.
                        // After .between(), we convert each naive-UTC instance back to local time.
                        const s = e.start;
                        const dtstart = e.dtStartHasTzid
                            ? new Date(Date.UTC(s.getFullYear(), s.getMonth(), s.getDate(),
                                               s.getHours(), s.getMinutes(), s.getSeconds()))
                            : s;

                        const rule = rrule.rrulestr(e.rrule, { dtstart });
                        const instances = rule.between(startOfDay, maxDays, true);
                        const uidExceptions = (e.uid && recurrenceExceptions[e.uid]) || [];

                        instances.forEach(naiveDate => {
                            // Convert naive-UTC back to a real local-time Date for TZID events.
                            const date = e.dtStartHasTzid
                                ? new Date(naiveDate.getUTCFullYear(), naiveDate.getUTCMonth(),
                                           naiveDate.getUTCDate(), naiveDate.getUTCHours(),
                                           naiveDate.getUTCMinutes(), naiveDate.getUTCSeconds())
                                : naiveDate;

                            if (e.exdates && e.exdates.includes(date.getTime())) return;
                            // Skip slots that are handled by a RECURRENCE-ID exception event
                            if (uidExceptions.includes(date.getTime())) return;
                            upcomingEvents.push({
                                summary: e.summary,
                                start: date,
                                end: new Date(date.getTime() + duration)
                            });
                        });
                    } catch (err) {
                        console.error('Failed to parse RRULE', e.rrule, err);
                    }
                } else {
                    if (e.start >= startOfDay && e.start <= maxDays) {
                        if (e.exdates && e.exdates.includes(e.start.getTime())) return;
                        upcomingEvents.push(e);
                    }
                }
            });

            const limit = isCompact ? 100 : 8;
            return upcomingEvents
                .sort((a, b) => a.start - b.start)
                .slice(0, limit); // Take next N events so they fit on the slide
        }

        function parseICSDate(icsDateString) {
            // Valid formats: YYYYMMDDTHHMMSSZ, YYYYMMDDTHHMMSS, or YYYYMMDD
            if (!icsDateString) return new Date();

            const y = parseInt(icsDateString.substr(0, 4), 10);
            const m = parseInt(icsDateString.substr(4, 2), 10) - 1;
            const d = parseInt(icsDateString.substr(6, 2), 10);

            if (icsDateString.length === 8) {
                // All day event
                return new Date(y, m, d);
            }

            const h = parseInt(icsDateString.substr(9, 2), 10) || 0;
            const min = parseInt(icsDateString.substr(11, 2), 10) || 0;
            const s = parseInt(icsDateString.substr(13, 2), 10) || 0;

            if (icsDateString.endsWith('Z')) {
                return new Date(Date.UTC(y, m, d, h, min, s));
            } else {
                return new Date(y, m, d, h, min, s);
            }
        }

        function formatDate(date) {
            return date.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function formatDateShort(date) {
            return date.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
        }

        function formatTime(date) {
            return date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
        }

        function formatWeekday(date) {
            return ['So','Mo','Di','Mi','Do','Fr','Sa'][date.getDay()];
        }

        function getNextMonday() {
            const d = new Date();
            d.setHours(0, 0, 0, 0);
            const day = d.getDay();
            const daysUntil = day === 0 ? 1 : (8 - day) % 7 || 7;
            d.setDate(d.getDate() + daysUntil);
            return d;
        }

        function buildSocialMediaSlide(events, isPoster = false, showLegend = false) {
            document.getElementById('canvas').classList.add('social-media');
            const container = document.getElementById('slides-container');
            container.innerHTML = '';

            if (isPoster) {
                const nextMonday = getNextMonday();
                events = events.filter(e => e.start >= nextMonday);
            }

            const slide = document.createElement('div');
            slide.className = 'slide active';

            const wrapper = document.createElement('div');
            wrapper.className = 'sm-slide';

            // Header
            const header = document.createElement('div');
            header.className = 'sm-header';
            header.innerHTML = `<h1 class="sm-header-title">Nächste Termine<br>von vielbunt</h1>`;
            wrapper.appendChild(header);

            // Events list
            const list = document.createElement('div');
            list.className = 'sm-events';

            const INTERNAL_KEYWORDS = [
                'Vorstandssitzung', 'Jugendvorstand',
                'UAG', 'AG', 'UAK', 'AK', 'JV', 'HA', 'AKÖ'
            ];
            const isInternal = summary =>
                INTERNAL_KEYWORDS.some(kw => summary.includes(kw));

            events.slice(0, 10).forEach(e => {
                const hasTime = e.start.getHours() !== 0 || e.start.getMinutes() !== 0;
                const weekday = formatWeekday(e.start);
                const datePart = formatDateShort(e.start);
                const dateLabel = hasTime
                    ? `${weekday} ${datePart} · ${formatTime(e.start)} Uhr`
                    : `${weekday} ${datePart}`;
                const summary = e.summary || 'Termin';
                const titleClass = isInternal(summary)
                    ? 'sm-event-title sm-event-title--internal'
                    : 'sm-event-title';

                const row = document.createElement('div');
                row.className = 'sm-event';
                row.innerHTML = `
                    <span class="sm-event-date">${dateLabel}</span>
                    <p class="${titleClass}">${summary}</p>`;
                list.appendChild(row);
            });

            wrapper.appendChild(list);

            // Legend (optional)
            if (showLegend) {
                const legend = document.createElement('div');
                legend.className = 'sm-legend';
                legend.innerHTML = `
                    <span class="sm-legend-swatch" style="background:#000"></span>
                    <p class="sm-legend-text" style="color:#000">Veranstaltung</p>
                    <span class="sm-legend-swatch" style="margin-left:2cqw"></span>
                    <p class="sm-legend-text">Arbeitstreffen</p>`;
                wrapper.appendChild(legend);
            }

            // Footer
            const footer = document.createElement('div');
            footer.className = 'sm-footer';
            footer.innerHTML = `<p class="sm-footer-text">Mehr Termine auf vielbunt.org</p>`;
            wrapper.appendChild(footer);

            slide.appendChild(wrapper);
            container.appendChild(slide);
            slidesData = document.querySelectorAll('.slide');

            // Remove any events that overflow the list container
            requestAnimationFrame(() => requestAnimationFrame(() => {
                const listRect = list.getBoundingClientRect();
                list.querySelectorAll('.sm-event').forEach(row => {
                    if (row.getBoundingClientRect().bottom > listRect.bottom + 1) {
                        row.remove();
                    }
                });
            }));
        }

                                        <path d="M0,-29.63C0,-38.023 -6.686,-44.829 -14.926,-44.829C-23.17,-44.829 -29.853,-38.023 -29.853,-29.63L-29.853,28.639L0,28.639L0,-29.63Z" style="fill:white;fill-rule:nonzero;"/>
                                    </g>
                                    <g id="Red" transform="matrix(1.386102,0,0,1.386102,328.190498,201.828884)">
                                        <path d="M0,-5.832C0,-14.223 -6.685,-21.029 -14.925,-21.029C-23.168,-21.029 -29.852,-14.223 -29.852,-5.832L-29.852,26.791L0,26.791L0,-5.832Z" style="fill:white;fill-rule:nonzero;"/>
                                    </g>
                                </g>
                            </g>
                        </g>
                    </svg>
                </div>`;
                container.appendChild(logoSlide);
            }

            // 3. Events Slide
            if (events.length > 0) {
                const eventSlide = document.createElement('div');
                eventSlide.className = 'slide';

                const wrapper = document.createElement('div');
                wrapper.className = 'slide-content-wrapper events-slide';
                if (isCompact) {
                    wrapper.classList.add('compact');
                }
                wrapper.style.justifyContent = 'flex-start';

                const title = document.createElement('h1');
                title.textContent = 'Nächste Termine von vielbunt:';
                wrapper.appendChild(title);

                const list = document.createElement('div');
                list.className = 'event-list';

                wrapper.appendChild(list);
                eventSlide.appendChild(wrapper);
                container.appendChild(eventSlide);

                // Insert all event items into the DOM first
                for (const e of events) {
                    const item = document.createElement('div');
                    item.className = 'event-item';

                    const timeString = (e.start.getHours() !== 0 || e.start.getMinutes() !== 0)
                        ? `${formatTime(e.start)} Uhr`
                        : 'Ganztägig';

                    item.innerHTML = `
                        <div class="event-date">${formatDate(e.start)}</div>
                        <div class="event-details">
                            <div class="event-title">${e.summary || 'Termin'}</div>
                            <div class="event-time">${timeString}</div>
                        </div>
                    `;
                    list.appendChild(item);
                }

                // In compact mode: after the browser has done layout, trim items that overflow.
                // We use requestAnimationFrame twice to ensure styles are fully applied.
                if (isCompact) {
                    requestAnimationFrame(() => requestAnimationFrame(() => {
                        // Use the title's top offset as the bottom margin (symmetric spacing)
                        const titleRect = title.getBoundingClientRect();
                        const marginToKeep = titleRect.top > 0 ? titleRect.top : (window.innerHeight * 0.02);
                        const maxAllowedBottom = window.innerHeight - marginToKeep;

                        const items = Array.from(list.querySelectorAll('.event-item'));
                        for (const item of items) {
                            const rect = item.getBoundingClientRect();
                            if (rect.bottom > maxAllowedBottom) {
                                list.removeChild(item);
                            }
                        }
                    }));
                }
            }

            slidesData = document.querySelectorAll('.slide');
            if (slidesData.length > 0) {
                slidesData[0].classList.add('active');
            }

            // 4. Mitmachen Slide (optional, if mode=mitmachen)
            if (isMitmachen) {
                const mitmachenSlide = document.createElement('div');
                mitmachenSlide.className = 'slide';
                mitmachenSlide.innerHTML = `
                    <div class="slide-content-wrapper mitmachen-slide">
                        <div class="mitmachen-text">Dir gefällt, was du hier bei vielbunt siehst?<br>Dann mach' bei uns mit!</div>
                        <div class="mitmachen-url">vielbunt.org/mitmachen</div>
                    </div>`;
                container.appendChild(mitmachenSlide);
            }

            slidesData = document.querySelectorAll('.slide');
            if (slidesData.length > 0) {
                slidesData[0].classList.add('active');
            }
        }

        let slideInterval;

        function startSlideshow() {
            if (slidesData.length <= 1) return; // No slideshow needed if somehow 1 or 0 slides

            slideInterval = setInterval(() => {
                nextSlide();
            }, 15000); // 15 seconds rotation

            // Allow arrow keys to skip
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') {
                    resetTimer();
                    nextSlide();
                } else if (e.key === 'ArrowLeft') {
                    resetTimer();
                    prevSlide();
                }
            });
        }

        function nextSlide() {
            if (slidesData.length <= 0) return;
            slidesData[currentSlideIndex].classList.remove('active');
            currentSlideIndex = (currentSlideIndex + 1) % slidesData.length;
            slidesData[currentSlideIndex].classList.add('active');
        }

        function prevSlide() {
            if (slidesData.length <= 0) return;
            slidesData[currentSlideIndex].classList.remove('active');
            currentSlideIndex = (currentSlideIndex - 1 + slidesData.length) % slidesData.length;
            slidesData[currentSlideIndex].classList.add('active');
        }

        function resetTimer() {
            clearInterval(slideInterval);
            slideInterval = setInterval(() => {
                nextSlide();
            }, 15000);
        }

        function startDisco() {
            document.body.classList.add('disco-mode');
            document.getElementById('canvas').classList.add('disco-mode');

            // Flash overlay
            const flashOverlay = document.createElement('div');
            flashOverlay.className = 'flash-overlay';
            document.body.appendChild(flashOverlay);

            // Glitter
            const colors = ['#FFF', '#FFD700', '#FF69B4', '#00FFFF', '#00FF00', '#FFA500', '#E0B0FF'];
            for (let i = 0; i < 200; i++) {
                const glitter = document.createElement('div');
                glitter.className = 'glitter';
                glitter.style.left = Math.random() * 100 + 'vw';
                glitter.style.top = Math.random() * 100 + 'vh';
                glitter.style.animationDuration = (Math.random() * 1.5 + 0.5) + 's';
                glitter.style.animationDelay = (Math.random() * 2) + 's';
                const color = colors[Math.floor(Math.random() * colors.length)];
                glitter.style.backgroundColor = color;
                glitter.style.boxShadow = `0 0 10px ${color}, 0 0 20px ${color}`;
                
                const size = Math.random() * 6 + 2;
                glitter.style.width = size + 'px';
                glitter.style.height = size + 'px';
                
                document.body.appendChild(glitter);
            }
        }

        // Run
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
